name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npx tsc --build

  generate-test:
    name: Generator smoke test
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npx tsc --build

      - name: Generate petstore SDK
        run: node packages/cli/dist/index.js generate --spec specs/petstore.yaml --lang typescript --output /tmp/petstore-sdk

      - name: Typecheck generated SDK
        run: |
          cd /tmp/petstore-sdk
          npm install --save-dev typescript
          ./node_modules/.bin/tsc --noEmit
